<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>QuantumMail Vault</title>

  <style>
    :root {
      --bg: #0b0f1a;
      --card: #12182a;
      --border: rgba(255,255,255,.08);
      --text: #e9eefc;
      --muted: #9aa6d6;
      --accent: #6ea8fe;
      --green: #2bd576;
      --danger: #ff5d5d;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #0f1730, #0b0f1a);
      color: var(--text);
      font-family: system-ui;
    }

    .wrap {
      max-width: 1100px;
      margin: auto;
      padding: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 16px;
      border: 1px solid var(--border);
    }

    button {
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      margin-right: 8px;
    }

    .primary { background: var(--accent); }
    .success { background: var(--green); }
    .danger { background: var(--danger); }

    .device {
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
<div class="wrap">

  <h1>🔐 QuantumMail Vault</h1>

  <div class="grid">

    <!-- CURRENT DEVICE -->
    <div class="card">
      <h2>🖥 Current Device</h2>
      <div id="currentDeviceBox"></div>
    </div>

    <!-- RECOVERY -->
    <div class="card">
      <h2>🔐 Recovery</h2>

      <button id="startRecoveryBtn" class="primary">Start Recovery</button>
      <button id="checkRecoveryBtn">Check Status</button>
      <button id="finishRecoveryBtn" class="success">Complete Recovery</button>

      <div id="recoveryStatus" style="margin-top:10px;"></div>
    </div>

  </div>

  <div class="card" style="margin-top:20px;">
    <h2>📱 Devices</h2>
    <div id="devicesList"></div>
  </div>

</div>

<script src="vault.js"></script>
</body>
</html>
